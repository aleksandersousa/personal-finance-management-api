services:
  api:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    container_name: financial-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - PORT=3000
      - API_PREFIX=${API_PREFIX:-api/v1}
      - THROTTLE_TTL=${THROTTLE_TTL:-60}
      - THROTTLE_LIMIT=${THROTTLE_LIMIT:-10}
      - FRONTEND_URL=${FRONTEND_URL}
      - DATABASE_SSL=${DATABASE_SSL:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ..:/app
      - /app/node_modules
    networks:
      - financial-network

  db:
    image: postgres:16-alpine
    container_name: financial-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${DB_NAME:-financial_db}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-financial_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - financial-network

  redis:
    image: redis:8.4-alpine
    container_name: financial-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - financial-network

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: financial-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - '9090:9090'
    networks:
      - financial-network

  grafana:
    image: grafana/grafana:11.1.0
    container_name: financial-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - '3002:3000'
    networks:
      - financial-network

  loki:
    image: grafana/loki:3.1.1
    container_name: financial-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - '3100:3100'
    networks:
      - financial-network

  promtail:
    image: grafana/promtail:3.1.1
    container_name: financial-promtail
    restart: unless-stopped
    volumes:
      - ..:/app
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - financial-network

  tempo:
    image: grafana/tempo:2.6.0
    container_name: financial-tempo
    restart: unless-stopped
    command: [ "-config.file=/etc/tempo/config.yml" ]
    volumes:
      - ./tempo/config.yml:/etc/tempo/config.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # tempo HTTP API / traces
      - "4318:4318"   # OTLP HTTP receiver
    networks:
      - financial-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

networks:
  financial-network:
    driver: bridge 