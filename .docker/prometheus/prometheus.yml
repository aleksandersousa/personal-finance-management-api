global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'pfm-api'
    metrics_path: /api/v1/metrics
    static_configs:
      # When running the full docker-compose in .docker, the NestJS API service
      # is available as "api" on port 3000 inside the Docker network.
      - targets: ['api:3000']

